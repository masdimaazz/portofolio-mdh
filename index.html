<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-mdh.png" />
    <link rel="apple-touch-icon" href="/favicon-mdh.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Preload foto hero → LCP lebih cepat (dipasangkan fetchpriority di <img>) -->
    <link rel="preload" as="image" href="/profile.webp" type="image/webp" fetchpriority="high" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Muhammad Dimas Hadiyanto — graphic designer & visual storyteller in Jakarta. Branding, social campaigns, packaging, and UI/UX for brands and institutions." />
    <title>Muhammad Dimas Hadiyanto — Graphic Designer</title>
    <link rel="canonical" href="https://portofolio-mdh.vercel.app/" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Muhammad Dimas Hadiyanto — Graphic Designer" />
    <meta property="og:description" content="Graphic designer & visual storyteller in Jakarta. Branding, social campaigns, packaging, and UI/UX." />
    <meta property="og:url" content="https://portofolio-mdh.vercel.app" />
    <meta property="og:image" content="https://portofolio-mdh.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Muhammad Dimas Hadiyanto — Graphic Designer" />
    <meta name="twitter:description" content="Graphic designer & visual storyteller in Jakarta." />
    <meta name="twitter:image" content="https://portofolio-mdh.vercel.app/og-image.png" />
    <!-- Fonts di-self-host (public/fonts, via src/fonts.css) — tanpa request eksternal -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/archivo-900.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/space-grotesk-400.woff2" crossorigin />
    <!-- Warm-up koneksi Supabase → fetch konten lebih cepat -->
    <link rel="preconnect" href="https://zaplbmjwofqsrveqtqyd.supabase.co" crossorigin />

    <!-- Structured data — bantu Google memahami identitas & profil -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Muhammad Dimas Hadiyanto",
        "url": "https://portofolio-mdh.vercel.app/",
        "image": "https://portofolio-mdh.vercel.app/favicon-mdh.png",
        "jobTitle": "Graphic Designer",
        "description": "Graphic designer & visual storyteller in Jakarta. Branding, social campaigns, packaging, and UI/UX for brands and institutions.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Jakarta",
          "addressCountry": "ID"
        },
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Politeknik Negeri Media Kreatif Jakarta"
        },
        "knowsAbout": [
          "Graphic Design",
          "Brand Identity",
          "Social Media Campaigns",
          "Packaging Design",
          "UI/UX Design",
          "Motion Graphics",
          "3D Design"
        ],
        "sameAs": [
          "https://www.linkedin.com/in/muhammad-dimas-hadiyanto-a53b37331/"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
